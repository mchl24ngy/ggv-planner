<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- Solar-Verlauf für die Sonne -->
    <linearGradient id="favSolar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- Abgerundeter Hintergrund für modernen App-Look (Optional, sorgt für guten Kontrast im Browser-Tab) -->
  <rect width="64" height="64" rx="14" fill="#1F2937" />

  <!-- Die Sonne (leicht versetzt im Hintergrund) -->
  <circle cx="44" cy="22" r="11" fill="url(#favSolar)" />

  <!-- Abstrahiertes Immobiliendach / PV-Anlage in deiner Hauptfarbe #2563EB -->
  <g transform="translate(0, 4)">
    <!-- Die Solar-Dachfläche -->
    <polygon points="12,34 32,20 52,34 32,40" fill="#2563EB" />
    
    <!-- Reduziertes, stark sichtbares PV-Raster für kleine Auflösungen -->
    <line x1="32" y1="20" x2="32" y2="40" stroke="#FFFFFF" stroke-width="2" />
    <line x1="22" y1="27" x2="42" y2="27" stroke="#FFFFFF" stroke-width="1.5" />
    <line x1="17" y1="32" x2="47" y2="32" stroke="#FFFFFF" stroke-width="1.5" />
    
    <!-- Angedeutete Hauskante nach unten für den Immobilien-Bezug -->
    <path d="M12,34 V44 L32,54 L52,44 V34" fill="none" stroke="#4B5563" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
